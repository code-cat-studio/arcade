<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Cat Arcade</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    color: #0D1B3E;
    background-color: #EAF2FC;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: #0D1B3E;
    padding: 1.1rem 2.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    display: flex;
    align-items: center;
  }
  .logo-text {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .logo-name {
    font-size: 19px;
    font-weight: 900;
    letter-spacing: -0.3px;
    color: white;
  }
  .logo-tag {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.3px;
    color: #BFD7FF;
    background: rgba(91,159,255,0.18);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .logo-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.55);
    font-weight: 500;
    margin-top: 3px;
  }
  .hero h1 {
    font-size: 20px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.3px;
    text-align: right;
  }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 2.5rem 2rem 3rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }

  /* ── SECTION ── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 1rem;
    padding-bottom: 0.7rem;
    border-bottom: 2px solid rgba(13,27,62,0.1);
  }
  .section-icon { font-size: 18px; }
  .section-title {
    font-size: 19px;
    font-weight: 800;
    color: #0D1B3E;
    letter-spacing: -0.3px;
  }

  /* ── GRID ── */
  .activities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 1rem;
  }

  /* ── CARD ── */
  .activity-card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(13,27,62,0.07), 0 0 0 1px rgba(13,27,62,0.06);
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .activity-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(13,27,62,0.13), 0 0 0 1px rgba(13,27,62,0.06);
  }

  .card-stripe { height: 5px; }
  .stripe-games { background: linear-gradient(90deg, #0D1B3E, #1E5DBE); }
  .stripe-tools { background: linear-gradient(90deg, #92400E, #F59E0B); }

  .card-top {
    padding: 1.1rem 1.2rem 0.9rem;
    flex: 1;
  }
  .card-title {
    font-size: 19px;
    font-weight: 800;
    color: #0D1B3E;
    margin-bottom: 6px;
    line-height: 1.2;
    letter-spacing: -0.4px;
  }
  .card-desc {
    font-size: 13px;
    color: #6B7592;
    font-weight: 500;
    line-height: 1.6;
  }

  .card-actions {
    padding: 0.9rem 1.2rem;
    border-top: 1px solid #F0F2F8;
    display: flex;
    gap: 8px;
  }
  .btn-play {
    flex: 1;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    background: #1E5DBE;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-play:hover { background: #1849A0; }
  .btn-play:active { transform: scale(0.97); }

  .btn-qr {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    background: #F4F5F8;
    color: #0D1B3E;
    border: 1px solid #E0E4F0;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-qr:hover { background: #E8EAF2; }
  .btn-qr:active { transform: scale(0.97); }

  /* ── QR OVERLAY ── */
  .qr-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,30,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    backdrop-filter: blur(4px);
  }
  .qr-overlay.visible { display: flex; }

  .qr-modal {
    background: white;
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    max-width: 380px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    position: relative;
  }
  .qr-close {
    position: absolute;
    top: 16px; right: 16px;
    background: #F0F2F8;
    border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #6B7592;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    transition: background 0.15s;
  }
  .qr-close:hover { background: #E3E6F0; color: #0D1B3E; }

  .qr-header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding-bottom: 1rem;
    border-bottom: 1px solid #F0F2F8;
  }
  .qr-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #1E5DBE;
  }
  .qr-title {
    font-size: 22px;
    font-weight: 800;
    color: #0D1B3E;
    text-align: center;
    letter-spacing: -0.3px;
  }
  #qr-code-container {
    padding: 16px;
    background: white;
    border-radius: 12px;
    border: 2px solid #E8EBF4;
  }
  .qr-instruction {
    font-size: 13px;
    font-weight: 500;
    color: #6B7592;
    text-align: center;
    line-height: 1.6;
  }
  .qr-url {
    font-size: 10px;
    color: #B0B8D0;
    font-weight: 500;
    text-align: center;
    word-break: break-all;
    padding: 0 1rem;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <img src="logo.png" alt="Code Cat" style="height:38px; width:38px; object-fit:contain; margin-right:12px;">
    <div>
      <div class="logo-text">
        <span class="logo-name">Code Cat Studio</span>
        <span class="logo-tag">Arcade</span>
      </div>
      <div class="logo-sub">Choose an activity. Share the code.</div>
    </div>
  </div>
  <div class="hero">
    <h1>Teacher Hub</h1>
  </div>
</div>

<div class="main" id="activities-container"></div>

<!-- QR OVERLAY -->
<div class="qr-overlay" id="qr-overlay">
  <div class="qr-modal">
    <button class="qr-close" onclick="closeQR()">✕</button>
    <div class="qr-header">
      <div class="qr-eyebrow">Scan to Play</div>
      <div class="qr-title" id="qr-modal-title">Activity</div>
    </div>
    <div id="qr-code-container"></div>
    <div class="qr-instruction">Point iPad camera at the code<br>Tap the link that appears</div>
    <div class="qr-url" id="qr-url-display"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ACTIVITY LIST — add new activities here only
// ══════════════════════════════════════════════
const activities = [
  {
    title: "Wordle",
    category: "games",
    description: "Guess the Word!",
    file: "classroom-wordle.html",
    ready: true
  },
  {
    title: "Wheel of Fortune",
    category: "games",
    description: "Spin. Solve. Win!",
    file: "WheelOfFortune_V4.html",
    ready: true
  },
  {
    title: "QuizPair",
    category: "games",
    description: "iPad peer grading",
    file: "quizpair/index.html",
    versions: 2,
    ready: true
  },
  {
    title: "Exam Timer",
    category: "tools",
    description: "Clean fullscreen timer for tests and quizzes.",
    file: "exam-clock-v6.html",
    ready: true
  },
  {
    title: "Countdown to Summer",
    category: "tools",
    description: "How many days until vacation?",
    file: "countdown-to-summerv2.html",
    ready: true
  },
   {
    title: "SpeakEasy",
    category: "tools",
    description: "Read. Answer. Score.",
    file: "speakeasy.html",
    ready: true
  },
];

// ══════════════════════════════════════════════
//  BASE URL
// ══════════════════════════════════════════════
const BASE_URL = window.location.href.replace('index.html','').replace(/\/$/,'');

const catConfig  = {
  games: { label: "Games", icon: "🎮" },
  tools: { label: "Tools", icon: "🛠️" },
};
const stripeClass = { games: "stripe-games", tools: "stripe-tools" };

let qrInstance = null;

function render() {
  const container = document.getElementById('activities-container');
  container.innerHTML = '';
  Object.keys(catConfig).forEach(cat => {
    const items = activities.filter(a => a.category === cat && a.ready);
    if (!items.length) return;
    const cfg = catConfig[cat];
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${cfg.icon}</span>
        <span class="section-title">${cfg.label}</span>
      </div>
      <div class="activities-grid" id="grid-${cat}"></div>
    `;
    container.appendChild(section);
    const grid = section.querySelector(`#grid-${cat}`);
    items.forEach(activity => {
      const card = document.createElement('div');
      card.className = 'activity-card';
      const playIcon = activity.versions ? '☰' : '▶';
      const playLabel = activity.versions ? 'Choose version' : 'Play';
      const qrButton = activity.versions
        ? ''
        : `<button class="btn-qr" onclick="showQR('${activity.title}','${activity.file}')">📱 QR Code</button>`;
      card.innerHTML = `
        <div class="card-stripe ${stripeClass[activity.category]}"></div>
        <div class="card-top">
          <div class="card-title">${activity.title}</div>
          <div class="card-desc">${activity.description}</div>
        </div>
        <div class="card-actions">
          <button class="btn-play" onclick="playActivity('${activity.file}')">${playIcon} ${playLabel}</button>
          ${qrButton}
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function playActivity(file) { window.open(file, '_blank'); }

function showQR(title, file) {
  const url = BASE_URL + '/' + file;
  document.getElementById('qr-modal-title').textContent = title;
  document.getElementById('qr-url-display').textContent = url;
  const container = document.getElementById('qr-code-container');
  container.innerHTML = '';
  qrInstance = null;
  qrInstance = new QRCode(container, {
    text: url,
    width: 224,
    height: 224,
    colorDark: '#0D1B3E',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qr-overlay').classList.add('visible');
}

function closeQR() {
  document.getElementById('qr-overlay').classList.remove('visible');
}

document.getElementById('qr-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('qr-overlay')) closeQR();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeQR(); });

render();
</script>
</body>
</html>
