<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Cat Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    color: #0D1B3E;
    background-color: #FAF8F4;
    background-image: radial-gradient(circle, #C8C0B0 1px, transparent 1px);
    background-size: 24px 24px;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .header {
    background: #0D1B3E;
    padding: 0 2.5rem;
    height: 60px;
    display: flex;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .logo {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.3px;
    color: white;
  }
  .logo span { color: #5B9FFF; }

  /* ── HERO ── */
  .hero {
    background: #1E5DBE;
    padding: 1.25rem 2.5rem;
  }
  .hero h1 {
    font-size: 22px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.3px;
  }
  .hero p {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    font-weight: 500;
    margin-top: 4px;
  }

  /* ── MAIN ── */
  .main {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 2.5rem 2rem 3rem;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 2.5rem;
  }

  /* ── SECTION ── */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 10px;
    margin-bottom: 1.1rem;
    padding-bottom: 0.8rem;
    border-bottom: 2px solid rgba(13,27,62,0.1);
  }
  .section-icon { font-size: 18px; }
  .section-title {
    font-size: 19px;
    font-weight: 800;
    color: #0D1B3E;
    letter-spacing: -0.3px;
  }
  .section-count {
    font-size: 12px;
    font-weight: 600;
    color: #9AA3B8;
    background: rgba(13,27,62,0.07);
    padding: 3px 10px;
    border-radius: 20px;
    margin-left: auto;
  }

  /* ── GRID ── */
  .activities-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.1rem;
  }

  /* ── CARD ── */
  .activity-card {
    background: white;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(13,27,62,0.07), 0 0 0 1px rgba(13,27,62,0.06);
    display: flex;
    flex-direction: column;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .activity-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(13,27,62,0.13), 0 0 0 1px rgba(13,27,62,0.06);
  }

  .card-stripe { height: 5px; }
  .stripe-games { background: linear-gradient(90deg, #0D1B3E, #1E5DBE); }
  .stripe-tools { background: linear-gradient(90deg, #92400E, #F59E0B); }

  .card-top {
    padding: 1.4rem 1.4rem 1.1rem;
    flex: 1;
  }
  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-badge {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .badge-games { background: #EBF2FF; color: #1E5DBE; }
  .badge-tools { background: #FEF3C7; color: #92400E; }

  .card-ready {
    font-size: 11px;
    font-weight: 600;
    color: #16A34A;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .card-ready::before {
    content: '';
    width: 6px;
    height: 6px;
    background: #16A34A;
    border-radius: 50%;
    display: inline-block;
  }

  .card-title {
    font-size: 22px;
    font-weight: 800;
    color: #0D1B3E;
    margin-bottom: 8px;
    line-height: 1.2;
    letter-spacing: -0.4px;
  }
  .card-desc {
    font-size: 13px;
    color: #6B7592;
    font-weight: 500;
    line-height: 1.65;
  }

  .card-actions {
    padding: 1.1rem 1.4rem;
    border-top: 1px solid #F0F2F8;
    display: flex;
    gap: 8px;
  }
  .btn-play {
    flex: 1;
    padding: 12px 18px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    background: #1E5DBE;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-play:hover { background: #1849A0; }
  .btn-play:active { transform: scale(0.97); }

  .btn-qr {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    font-family: 'Inter', sans-serif;
    background: #F4F5F8;
    color: #0D1B3E;
    border: 1px solid #E0E4F0;
    border-radius: 10px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .btn-qr:hover { background: #E8EAF2; }
  .btn-qr:active { transform: scale(0.97); }

  /* ── FOOTER ── */
  footer {
    background: #0D1B3E;
    padding: 1.1rem 2.5rem;
  }
  .footer-brand {
    font-size: 14px;
    font-weight: 800;
    color: white;
    letter-spacing: -0.2px;
  }
  .footer-brand span { color: #5B9FFF; }

  /* ── QR OVERLAY ── */
  .qr-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(5,10,30,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    backdrop-filter: blur(4px);
  }
  .qr-overlay.visible { display: flex; }

  .qr-modal {
    background: white;
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    max-width: 380px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    position: relative;
  }
  .qr-close {
    position: absolute;
    top: 16px; right: 16px;
    background: #F0F2F8;
    border: none;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: #6B7592;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    transition: background 0.15s;
  }
  .qr-close:hover { background: #E3E6F0; color: #0D1B3E; }

  .qr-header {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding-bottom: 1rem;
    border-bottom: 1px solid #F0F2F8;
  }
  .qr-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #1E5DBE;
  }
  .qr-title {
    font-size: 22px;
    font-weight: 800;
    color: #0D1B3E;
    text-align: center;
    letter-spacing: -0.3px;
  }
  #qr-code-container {
    padding: 16px;
    background: white;
    border-radius: 12px;
    border: 2px solid #E8EBF4;
  }
  .qr-instruction {
    font-size: 13px;
    font-weight: 500;
    color: #6B7592;
    text-align: center;
    line-height: 1.6;
  }
  .qr-url {
    font-size: 10px;
    color: #B0B8D0;
    font-weight: 500;
    text-align: center;
    word-break: break-all;
    padding: 0 1rem;
    font-family: monospace;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Code Cat <span>Arcade</span></div>
</div>

<div class="hero">
  <h1>Teacher Hub</h1>
  <p>Choose an activity. Share the code.</p>
</div>

<div class="main" id="activities-container"></div>

<footer>
  <div class="footer-brand">Code Cat <span>Studio</span></div>
</footer>

<!-- QR OVERLAY -->
<div class="qr-overlay" id="qr-overlay">
  <div class="qr-modal">
    <button class="qr-close" onclick="closeQR()">✕</button>
    <div class="qr-header">
      <div class="qr-eyebrow">Scan to Play</div>
      <div class="qr-title" id="qr-modal-title">Activity</div>
    </div>
    <div id="qr-code-container"></div>
    <div class="qr-instruction">Point iPad camera at the code<br>Tap the link that appears</div>
    <div class="qr-url" id="qr-url-display"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
//  ACTIVITY LIST — add new activities here only
// ══════════════════════════════════════════════
const activities = [
  {
    title: "Wordle",
    category: "games",
    description: "Guess the Word!",
    file: "classroom-wordle.html",
    ready: true
  },
  {
    title: "Wheel of Fortune",
    category: "games",
    description: "Spin. Solve. Win!",
    file: "WheelOfFortune_V4.html",
    ready: true
  },
  {
    title: "QuizPair",
    category: "games",
    description: "Two students, one iPad. One asks, one answers out loud. Peer grading with live scores.",
    file: "quizpair.html",
    ready: true
  },
  {
    title: "Exam Timer",
    category: "tools",
    description: "Clean fullscreen timer for tests and quizzes.",
    file: "exam-clock-v6.html",
    ready: true
  },
  {
    title: "Countdown to Summer",
    category: "tools",
    description: "How many days until vacation?",
    file: "countdown-to-summerv2.html",
    ready: true
  },
];

// ══════════════════════════════════════════════
//  BASE URL
// ══════════════════════════════════════════════
const BASE_URL = window.location.href.replace('index.html','').replace(/\/$/,'');

const catConfig  = {
  games: { label: "Games", icon: "🎮" },
  tools: { label: "Tools", icon: "🛠️" },
};
const badgeClass  = { games: "badge-games", tools: "badge-tools" };
const stripeClass = { games: "stripe-games", tools: "stripe-tools" };

let qrInstance = null;

function render() {
  const container = document.getElementById('activities-container');
  container.innerHTML = '';
  Object.keys(catConfig).forEach(cat => {
    const items = activities.filter(a => a.category === cat && a.ready);
    if (!items.length) return;
    const cfg = catConfig[cat];
    const section = document.createElement('div');
    section.innerHTML = `
      <div class="section-header">
        <span class="section-icon">${cfg.icon}</span>
        <span class="section-title">${cfg.label}</span>
        <span class="section-count">${items.length} ${items.length === 1 ? 'activity' : 'activities'}</span>
      </div>
      <div class="activities-grid" id="grid-${cat}"></div>
    `;
    container.appendChild(section);
    const grid = section.querySelector(`#grid-${cat}`);
    items.forEach(activity => {
      const card = document.createElement('div');
      card.className = 'activity-card';
      card.innerHTML = `
        <div class="card-stripe ${stripeClass[activity.category]}"></div>
        <div class="card-top">
          <div class="card-meta">
            <span class="card-badge ${badgeClass[activity.category]}">${cfg.label}</span>
            <span class="card-ready">Ready</span>
          </div>
          <div class="card-title">${activity.title}</div>
          <div class="card-desc">${activity.description}</div>
        </div>
        <div class="card-actions">
          <button class="btn-play" onclick="playActivity('${activity.file}')">▶ Play</button>
          <button class="btn-qr" onclick="showQR('${activity.title}','${activity.file}')">📱 QR Code</button>
        </div>
      `;
      grid.appendChild(card);
    });
  });
}

function playActivity(file) { window.open(file, '_blank'); }

function showQR(title, file) {
  const url = BASE_URL + '/' + file;
  document.getElementById('qr-modal-title').textContent = title;
  document.getElementById('qr-url-display').textContent = url;
  const container = document.getElementById('qr-code-container');
  container.innerHTML = '';
  qrInstance = null;
  qrInstance = new QRCode(container, {
    text: url,
    width: 224,
    height: 224,
    colorDark: '#0D1B3E',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
  document.getElementById('qr-overlay').classList.add('visible');
}

function closeQR() {
  document.getElementById('qr-overlay').classList.remove('visible');
}

document.getElementById('qr-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('qr-overlay')) closeQR();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeQR(); });

render();
</script>
</body>
</html>
