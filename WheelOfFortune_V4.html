<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎡 Wheel of Fortune</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: linear-gradient(160deg,#ff6ec7 0%,#a855f7 35%,#3b82f6 70%,#06b6d4 100%);
  --gold: #ffe000;
  --gold2: #ffb300;
  --gold-shadow: #8a6000;
  --teal: #00f0d0;
  --green: #00e855;
  --red: #ff2244;
  --blue: #2277ff;
  --tile-hidden: #1a1060;
  --tile-border: #6655ff;
  --tile-text: #220044;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  color: #fff;
  display: flex;
  flex-direction: column;
}

/* ── SCREENS ── */
.screen { display: none; position: fixed; inset: 0; z-index: 10; }
.screen.active { display: flex; }

/* ══════════════════════════════════
   SETUP SCREEN
══════════════════════════════════ */
#setup {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 22px;
  background: var(--bg);
  padding: 30px;
}
.setup-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.5rem,7vw,6rem);
  color: var(--gold);
  text-shadow: 4px 4px 0 var(--gold-shadow);
  letter-spacing: 3px;
  text-align: center;
}
.setup-card {
  background: rgba(255,255,255,.14);
  border: 3px solid rgba(255,255,255,.35);
  border-radius: 28px;
  padding: clamp(22px,3vw,44px) clamp(22px,4vw,56px);
  max-width: 820px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 18px;
  backdrop-filter: blur(14px);
}
.setup-steps {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1rem,2.4vw,1.9rem);
  color: #fff;
  line-height: 1.8;
  text-align: center;
}
.setup-steps span { color: var(--gold); }
.setup-label {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.9rem,2vw,1.5rem);
  color: var(--teal);
}
.setup-input {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.3rem,3vw,2.4rem);
  padding: 16px 22px;
  border-radius: 16px;
  border: 3px solid rgba(255,255,255,.4);
  background: rgba(0,0,60,.45);
  color: var(--gold);
  letter-spacing: 4px;
  text-transform: uppercase;
  outline: none;
  width: 100%;
  transition: border-color .2s;
}
.setup-input:focus { border-color: var(--gold); }
.setup-input::placeholder { color: rgba(255,255,255,.3); font-size: .6em; text-transform: none; letter-spacing: 1px; }
.start-btn {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.2rem,3vw,2.4rem);
  padding: 18px 60px;
  background: linear-gradient(135deg,var(--gold),var(--gold2));
  color: #5c2a00;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 7px 0 var(--gold-shadow);
  transition: transform .15s, box-shadow .15s;
  align-self: center;
}
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 0 var(--gold-shadow); }
.start-btn:active { transform: translateY(3px); box-shadow: 0 4px 0 var(--gold-shadow); }

/* ══════════════════════════════════
   GAME SCREEN
   30% puzzle | 50% middle | 20% alpha
══════════════════════════════════ */
#game {
  flex-direction: column;
  background: var(--bg);
  width: 100vw;
  height: 100vh;
}

/* ── ROW 1: PUZZLE 30vh ── */
.puzzle-band {
  height: 30vh;
  width: 100%;
  background: rgba(0,0,0,.3);
  border-bottom: 4px solid rgba(255,255,255,.15);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 14px;
  gap: 6px;
  flex-shrink: 0;
}
.puzzle-row {
  display: flex;
  gap: 5px;
  justify-content: center;
}
.tile {
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fredoka One', cursive;
  flex-shrink: 0;
  transition: background .25s, color .25s, transform .15s;
}
.tile.letter {
  background: var(--tile-hidden);
  border: 3px solid var(--tile-border);
  color: transparent;
}
.tile.letter.revealed {
  background: var(--gold);
  border-color: var(--gold2);
  color: var(--tile-text);
  box-shadow: 0 0 14px rgba(255,224,0,.8);
}
.tile.space { background: transparent; border: none; }
@keyframes tileReveal {
  0%  { transform: rotateY(90deg) scale(.7); }
  100%{ transform: rotateY(0) scale(1.05); }
}
.tile.just-revealed { animation: tileReveal .3s ease-out both; }

/* ── ROW 2: MIDDLE 50vh ── */
.middle-band {
  height: 50vh;
  width: 100%;
  display: flex;
  flex-shrink: 0;
  border-bottom: 4px solid rgba(255,255,255,.15);
}

/* LEFT 20% */
.ctrl-panel {
  width: 20%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: clamp(8px,1.4vh,16px);
  padding: clamp(10px,1.5vw,22px);
  background: rgba(0,0,0,.22);
  border-right: 3px solid rgba(255,255,255,.1);
}
.spin-result {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.1rem,2.4vw,2.2rem);
  color: var(--gold);
  text-shadow: 2px 2px 0 var(--gold-shadow);
  text-align: center;
  line-height: 1.25;
  letter-spacing: .5px;
}
.spin-result.lose {
  color: #ff5555;
  text-shadow: 2px 2px 0 #800000;
  animation: shake .4s both;
}
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }
.turn-pill {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.8rem,1.7vw,1.5rem);
  padding: 8px 16px;
  border-radius: 50px;
  border: 3px solid rgba(255,255,255,.22);
  text-align: center;
  width: 100%;
  letter-spacing: .5px;
}
.turn-pill.t1 { background: rgba(220,20,60,.8); }
.turn-pill.t2 { background: rgba(20,80,220,.8); }
.ctrl-btn {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.75rem,1.5vw,1.3rem);
  padding: clamp(9px,1.3vh,16px) clamp(10px,1.5vw,20px);
  border-radius: 50px;
  border: none;
  cursor: pointer;
  width: 100%;
  transition: transform .15s, filter .15s;
  letter-spacing: .5px;
}
.ctrl-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
.ctrl-btn:disabled { opacity: .32; cursor: default; transform: none; }
.ctrl-btn.solve { background: linear-gradient(135deg,#00e855,#009930); color: #fff; box-shadow: 0 4px 0 #005520; }
.ctrl-btn.buy-v { background: linear-gradient(135deg,var(--gold),var(--gold2)); color: #5c2a00; box-shadow: 0 4px 0 var(--gold-shadow); }

/* CENTRE 60% */
.wheel-panel {
  width: 60%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 8px;
  background: rgba(0,0,0,.1);
}
canvas#wc {
  display: block;
  cursor: pointer;
  filter: drop-shadow(0 0 18px rgba(255,224,0,.5));
  transition: filter .2s;
}
canvas#wc:hover { filter: drop-shadow(0 0 30px rgba(255,224,0,.9)) brightness(1.06); }
canvas#wc.spinning { cursor: default; }

/* RIGHT 20% */
.score-panel {
  width: 20%;
  display: flex;
  flex-direction: column;
  border-left: 3px solid rgba(255,255,255,.1);
  overflow: hidden;
}
.score-half {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  padding: 8px;
  border: 4px solid transparent;
  transition: filter .15s, border-color .15s;
  gap: 4px;
}
.score-half:hover { filter: brightness(1.12); }
.score-half.active-team { border-color: var(--gold); box-shadow: inset 0 0 24px rgba(255,224,0,.2); }
.score-half.t1 { background: linear-gradient(160deg,#cc0020,#ff2244); border-bottom: 3px solid rgba(255,255,255,.15); }
.score-half.t2 { background: linear-gradient(160deg,#0044cc,#2277ff); }
.sh-name {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.65rem,1.4vw,1.2rem);
  color: rgba(255,255,255,.9);
  letter-spacing: 1px;
  text-align: center;
}
.sh-score {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.2rem,5.5vw,5rem);
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--gold-shadow);
  line-height: 1;
  text-align: center;
}

/* ── ROW 3: ALPHABET 20vh ── */
.alpha-band {
  height: 20vh;
  width: 100%;
  background: rgba(0,0,0,.38);
  display: flex;
  align-items: center;
  padding: 6px 8px;
  flex-shrink: 0;
  gap: 8px;
  position: relative;
}
.alpha-grid {
  display: grid;
  grid-template-columns: repeat(13,1fr);
  gap: 4px;
  flex: 1;
  height: 100%;
  padding-right: 90px; /* room for menu btn */
}
.alpha-btn {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.9rem,1.9vw,1.8rem);
  border-radius: 10px;
  border: 3px solid rgba(255,255,255,.28);
  background: rgba(255,255,255,.14);
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .12s, border-color .12s, transform .1s, opacity .2s;
}
.alpha-btn:hover:not(.used):not(:disabled) {
  background: var(--teal);
  border-color: var(--teal);
  color: #003328;
  transform: scale(1.1);
}
.alpha-btn.vowel {
  border-color: rgba(255,200,0,.5);
  color: #ffe880;
  background: rgba(255,200,0,.1);
}
.alpha-btn.vowel:hover:not(.used):not(:disabled) {
  background: var(--gold);
  border-color: var(--gold);
  color: #5c2a00;
}
.alpha-btn.used {
  opacity: .13;
  cursor: default;
  background: rgba(0,0,0,.2);
  border-color: transparent;
  transform: none !important;
}
.menu-corner {
  position: absolute;
  right: 8px;
  bottom: 8px;
}
.settings-icon {
  font-size: clamp(1rem,2vw,1.6rem);
  width: clamp(32px,3.5vw,52px);
  height: clamp(32px,3.5vw,52px);
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,.3);
  background: rgba(255,255,255,.12);
  color: rgba(255,255,255,.8);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
  line-height: 1;
}
.settings-icon:hover {
  background: rgba(255,255,255,.25);
  color: #fff;
  border-color: #fff;
  transform: rotate(30deg);
}

/* ══════════════════════════════════
   WIN SCREEN
══════════════════════════════════ */
#winscreen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  text-align: center;
  padding: 24px;
  background: var(--bg);
}
.win-emoji { font-size: clamp(4rem,10vw,8rem); animation: popSpin .6s cubic-bezier(.3,1.6,.5,1) both; }
@keyframes popSpin { from{transform:scale(0) rotate(-20deg)} to{transform:scale(1) rotate(0)} }
.win-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2rem,5.5vw,5rem);
  color: var(--gold);
  text-shadow: 5px 5px 0 var(--gold-shadow);
  letter-spacing: 2px;
  line-height: 1.2;
}
.win-phrase {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1rem,2.5vw,2.2rem);
  color: var(--teal);
  background: rgba(0,0,60,.55);
  border: 3px solid var(--teal);
  border-radius: 16px;
  padding: 14px 28px;
  letter-spacing: 3px;
  max-width: 900px;
  width: 90%;
}
.win-scores { display:flex; gap:20px; justify-content:center; flex-wrap:wrap; }
.win-box {
  font-family: 'Fredoka One', cursive;
  padding: 16px 36px;
  border-radius: 16px;
  border: 3px solid var(--gold);
  text-align: center;
  min-width: 150px;
}
.win-box.t1 { background: rgba(220,20,60,.8); }
.win-box.t2 { background: rgba(20,80,220,.8); }
.wbx-lbl { font-size: clamp(.7rem,1.4vw,1.1rem); opacity:.85; margin-bottom:6px; }
.wbx-val { font-size: clamp(1.6rem,3.5vw,3rem); color:var(--gold); text-shadow:2px 2px 0 var(--gold-shadow); }
.win-winner {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1rem,2.8vw,2.4rem);
  color: #fff;
  text-shadow: 2px 2px 0 #000;
  animation: glow 1s ease-in-out infinite alternate;
}
@keyframes glow { from{text-shadow:2px 2px 0 #000} to{text-shadow:2px 2px 0 #000,0 0 30px var(--gold)} }
.play-again {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.9rem,2vw,1.7rem);
  padding: 16px 44px;
  background: linear-gradient(135deg,var(--gold),var(--gold2));
  color: #5c2a00;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 6px 0 var(--gold-shadow);
  transition: transform .15s;
}
.play-again:hover { transform: translateY(-3px); }

/* ══════════════════════════════════
   MODALS
══════════════════════════════════ */
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,30,.9);
  z-index: 200; align-items: center; justify-content: center;
}
.modal-bg.open { display: flex; }
.modal-card {
  background: linear-gradient(135deg,#1a0060,#2a0090);
  border: 4px solid var(--gold);
  border-radius: 26px;
  padding: clamp(22px,3.5vw,48px) clamp(22px,4.5vw,60px);
  max-width: 680px;
  width: 92%;
  display: flex; flex-direction: column; gap: 18px; align-items: center;
  box-shadow: 0 0 0 4px var(--gold-shadow), 0 20px 60px rgba(0,0,0,.7);
  text-align: center;
}
.modal-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.4rem,3vw,2.6rem);
  color: var(--gold);
  text-shadow: 3px 3px 0 var(--gold-shadow);
}
.modal-input {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.1rem,2.5vw,2rem);
  padding: 14px 22px;
  border-radius: 14px;
  border: 3px solid rgba(255,255,255,.3);
  background: rgba(0,0,60,.7);
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  width: 100%;
  outline: none;
}
.modal-input:focus { border-color: var(--gold); }
.modal-input.name-input {
  letter-spacing: 1px;
  text-transform: none;
  color: #fff;
}
.modal-input.name-input:focus { border-color: var(--teal); }
.modal-btns { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.modal-btn {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.85rem,1.8vw,1.4rem);
  padding: 13px 34px;
  border-radius: 50px;
  border: none;
  cursor: pointer;
  transition: transform .15s;
  box-shadow: 0 5px 0 rgba(0,0,0,.4);
}
.modal-btn:hover { transform: translateY(-2px); }
.modal-btn.confirm { background: var(--green); color: #fff; }
.modal-btn.cancel  { background: rgba(255,255,255,.15); color: #fff; border: 2px solid rgba(255,255,255,.3); box-shadow: none; }
.modal-result {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1rem,2.3vw,1.9rem);
  display: none;
}
.modal-result.win  { color: var(--green); }
.modal-result.lose { color: #ff6060; }

/* team/score editor rows */
.edit-section {
  width: 100%;
  border-radius: 16px;
  padding: 14px 18px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.edit-section.t1-sec { background: rgba(200,10,40,.3); border: 2px solid rgba(255,80,80,.3); }
.edit-section.t2-sec { background: rgba(10,60,200,.3); border: 2px solid rgba(80,120,255,.3); }
.edit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  width: 100%;
}
.edit-row label {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.7rem,1.4vw,1.1rem);
  color: rgba(255,255,255,.75);
  min-width: 60px;
  text-align: right;
  flex-shrink: 0;
}
.edit-row input {
  flex: 1;
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.9rem,1.8vw,1.4rem);
  padding: 8px 14px;
  border-radius: 10px;
  border: 2px solid rgba(255,255,255,.25);
  background: rgba(0,0,60,.6);
  color: var(--gold);
  outline: none;
  transition: border-color .2s;
}
.edit-row input.name-f {
  color: #fff;
  letter-spacing: 1px;
}
.edit-row input:focus { border-color: var(--gold); }
.sc-save {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(.9rem,1.8vw,1.4rem);
  padding: 12px 40px;
  background: var(--gold);
  color: #5c2a00;
  border: none;
  border-radius: 50px;
  cursor: pointer;
  box-shadow: 0 5px 0 var(--gold-shadow);
  transition: transform .15s;
}
.sc-save:hover { transform: translateY(-2px); }

/* solve modal */
.solve-input {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.1rem,2.5vw,2rem);
  padding: 14px 22px;
  border-radius: 14px;
  border: 3px solid rgba(255,255,255,.3);
  background: rgba(0,0,60,.7);
  color: var(--gold);
  letter-spacing: 3px;
  text-transform: uppercase;
  width: 100%;
  outline: none;
}
.solve-input:focus { border-color: var(--gold); }

/* ── FLOAT LABEL ── */
.fl { position:fixed; font-family:'Fredoka One',cursive; font-size:clamp(1.2rem,2.8vw,2.2rem); pointer-events:none; z-index:400; text-shadow:2px 2px 0 #000; animation:floatUp 1.6s ease-out forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-90px) scale(1.4)} }

/* ── CONFETTI ── */
.cf { position:fixed; pointer-events:none; animation:cfall 2.6s ease-in forwards; z-index:999; border-radius:3px; }
@keyframes cfall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(110vh) rotate(800deg);opacity:0} }
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div class="screen active" id="setup">
  <div class="setup-title">🎡 Wheel of Fortune</div>
  <div class="setup-card">
    <div class="setup-steps">
      <span>①</span> Enter your phrase &nbsp;&nbsp; <span>②</span> Press Start!
    </div>
    <div>
      <div class="setup-label">📝 Your Phrase:</div>
      <input class="setup-input" id="phrase-input" type="text"
        placeholder="Type your phrase here..." autocomplete="off" spellcheck="false">
    </div>
    <button class="start-btn" onclick="startGame()">▶ Start Game!</button>
  </div>
</div>

<!-- ══ GAME ══ -->
<div class="screen" id="game">

  <!-- ROW 1: PUZZLE 30vh -->
  <div class="puzzle-band" id="puzzle-band"></div>

  <!-- ROW 2: MIDDLE 50vh -->
  <div class="middle-band">

    <!-- LEFT 20%: controls -->
    <div class="ctrl-panel">
      <div class="spin-result" id="spin-result">Click the wheel to spin!</div>
      <div class="turn-pill t1" id="turn-pill">🔴 <span id="tp-name">Team 1</span>'s Turn</div>
      <button class="ctrl-btn buy-v" id="buy-v-btn" onclick="openBuyVowel()">🔤 Buy Vowel (100 pts)</button>
      <button class="ctrl-btn solve" onclick="openSolve()">✅ SOLVE!</button>
    </div>

    <!-- CENTRE 60%: wheel -->
    <div class="wheel-panel">
      <canvas id="wc"></canvas>
    </div>

    <!-- RIGHT 20%: scores -->
    <div class="score-panel">
      <div class="score-half t1" id="sb1" onclick="openTeamEdit()">
        <div class="sh-name" id="sn1">🔴 TEAM 1</div>
        <div class="sh-score" id="ts1">0</div>
      </div>
      <div class="score-half t2" id="sb2" onclick="openTeamEdit()">
        <div class="sh-name" id="sn2">🔵 TEAM 2</div>
        <div class="sh-score" id="ts2">0</div>
      </div>
    </div>

  </div>

  <!-- ROW 3: ALPHABET 20vh -->
  <div class="alpha-band">
    <div class="alpha-grid" id="alpha-grid"></div>
    <div class="menu-corner">
      <button class="settings-icon" onclick="openSettings()" title="New Phrase">⚙</button>
    </div>
  </div>

</div>

<!-- ══ WIN ══ -->
<div class="screen" id="winscreen">
  <div class="win-emoji">🏆</div>
  <div class="win-title" id="win-title">Team 1 Wins!</div>
  <div class="win-phrase" id="win-phrase"></div>
  <div class="win-scores">
    <div class="win-box t1">
      <div class="wbx-lbl" id="wn1">🔴 Team 1</div>
      <div class="wbx-val" id="ws1">0</div>
    </div>

<script>
// ═══════════════════════════════════════════════
// AUDIO
// ═══════════════════════════════════════════════
let AC;
function getAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();return AC;}
function beep(freq,dur,type='square',vol=.14,delay=0){
  try{const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=type;
  o.frequency.setValueAtTime(freq,ac.currentTime+delay);
  g.gain.setValueAtTime(vol,ac.currentTime+delay);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+delay+dur);
  o.start(ac.currentTime+delay);o.stop(ac.currentTime+delay+dur+.05);}catch(e){}
}
const SFX={
  click:  ()=>beep(440,.07,'square',.1),
  reveal: ()=>{beep(523,.08,'square',.17,0);beep(659,.08,'square',.17,.09);beep(784,.14,'square',.17,.18);},
  wrong:  ()=>{beep(200,.15,'sawtooth',.2,0);beep(150,.25,'sawtooth',.2,.15);},
  lose:   ()=>{beep(300,.1,'sawtooth',.18,0);beep(220,.1,'sawtooth',.18,.12);beep(160,.2,'sawtooth',.18,.24);},
  vowel:  ()=>{beep(659,.08,'square',.15,0);beep(784,.12,'square',.15,.09);},
  fanfare:()=>{[523,523,523,415,523,659,784].forEach((f,i)=>beep(f,.13,'square',.2,i*.13));},
};
function snd(n){try{SFX[n]&&SFX[n]();}catch(e){}}
document.addEventListener('click',()=>{try{getAC().resume();}catch(e){}},{once:true});

// ═══════════════════════════════════════════════
// WHEEL
// ═══════════════════════════════════════════════
const SEGS=[
  {label:'100', pts:100, color:'#ff4da6'},
  {label:'LOSE',pts:0,   color:'#1a0060',lose:true},
  {label:'200', pts:200, color:'#ff8800'},
  {label:'100', pts:100, color:'#ff4da6'},
  {label:'300', pts:300, color:'#00cc44'},
  {label:'200', pts:200, color:'#ff8800'},
  {label:'400', pts:400, color:'#2277ff'},
  {label:'100', pts:100, color:'#ff4da6'},
  {label:'500', pts:500, color:'#ffe000'},
  {label:'200', pts:200, color:'#ff8800'},
  {label:'LOSE',pts:0,   color:'#1a0060',lose:true},
  {label:'300', pts:300, color:'#00cc44'},
  {label:'100', pts:100, color:'#ff4da6'},
  {label:'400', pts:400, color:'#2277ff'},
  {label:'200', pts:200, color:'#ff8800'},
  {label:'500', pts:500, color:'#ffe000'},
];
const NS=SEGS.length, ARC=(2*Math.PI)/NS;
let wAngle=0, spinning=false;

function sizeWheel(){
  const canvas=document.getElementById('wc');
  if(!canvas) return;
  const panel=document.querySelector('.wheel-panel');
  if(!panel) return;
  const sz=Math.max(140, Math.min(panel.clientWidth-16, panel.clientHeight-16));
  canvas.width=sz; canvas.height=sz;
  canvas.style.width=sz+'px'; canvas.style.height=sz+'px';
  drawWheel(wAngle);
}

function drawWheel(angle){
  const canvas=document.getElementById('wc');
  if(!canvas||!canvas.width) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, cx=W/2, cy=W/2;
  const outerR=cx-2;
  const innerR=outerR*0.08;
  const ptrH=outerR*0.22;
  const segR=outerR-ptrH*0.5;

  ctx.clearRect(0,0,W,W);

  // rotating segments only
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle);
  SEGS.forEach((seg,i)=>{
    const sa=i*ARC-Math.PI/2, ea=sa+ARC;
    ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,segR,sa,ea);ctx.closePath();
    ctx.fillStyle=seg.color;ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.22)';ctx.lineWidth=2;ctx.stroke();
    ctx.save();ctx.rotate(sa+ARC/2);
    ctx.textAlign='center';ctx.textBaseline='middle';
    const fs=Math.round(segR*.13);
    ctx.font=`bold ${fs}px "Fredoka One",Nunito,sans-serif`;
    ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.7)';ctx.shadowBlur=3;
    ctx.fillText(seg.label,segR*0.62,0);
    ctx.restore();
  });
  ctx.restore();

  // fixed outer ring
  ctx.beginPath();ctx.arc(cx,cy,segR,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,224,0,.85)';ctx.lineWidth=6;ctx.stroke();
  ctx.beginPath();ctx.arc(cx,cy,segR+2,0,2*Math.PI);
  ctx.strokeStyle='rgba(255,255,255,.25)';ctx.lineWidth=2;ctx.stroke();

  // fixed hub
  const hg=ctx.createRadialGradient(cx,cy,0,cx,cy,innerR);
  hg.addColorStop(0,'#fff');hg.addColorStop(.5,'#ddd');hg.addColorStop(1,'#aaa');
  ctx.beginPath();ctx.arc(cx,cy,innerR,0,2*Math.PI);
  ctx.fillStyle=hg;ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.3)';ctx.lineWidth=2;ctx.stroke();

  // fixed pointer — right side pointing left
  const tipX=cx+segR, tipY=cy;
  const baseX=cx+segR+ptrH, half=ptrH*0.65;
  ctx.beginPath();
  ctx.moveTo(tipX,tipY);
  ctx.lineTo(baseX,tipY-half);
  ctx.lineTo(baseX,tipY+half);
  ctx.closePath();
  ctx.fillStyle='#ff2244';ctx.strokeStyle='#fff';ctx.lineWidth=2.5;
  ctx.fill();ctx.stroke();
}

function spinToAngle(target,dur,cb){
  const start=wAngle, diff=target-start, t0=performance.now();
  function frame(now){
    const t=Math.min((now-t0)/dur,1);
    wAngle=start+diff*(1-Math.pow(1-t,4));
    drawWheel(wAngle);
    if(t<1) requestAnimationFrame(frame);
    else { drawWheel(wAngle); cb(); }
  }
  requestAnimationFrame(frame);
}

// ═══════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════
let answer='', revealed=[], usedLetters=new Set();
let currentTeam=0, roundScores=[0,0];
let teamNames=['Team 1','Team 2'];
let lastSpin=0, canGuess=false;
const VOWELS=new Set(['A','E','I','O','U']);

// ═══════════════════════════════════════════════
// SETUP
// ═══════════════════════════════════════════════
function startGame(){
  snd('click');
  const raw=document.getElementById('phrase-input').value.trim().toUpperCase();
  if(!raw){alert('Please enter a phrase!');return;}
  answer=raw.replace(/[^A-Z ]/g,'').replace(/  +/g,' ').trim();
  if(!answer){alert('Letters only please.');return;}
  initPuzzle();
  showScreen('game');
  requestAnimationFrame(sizeWheel);
}
function newPuzzle(){
  snd('click');
  roundScores=[0,0];
  updateScores();
  openSettings();
}
document.getElementById('phrase-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') startGame();
});

// ═══════════════════════════════════════════════
// PUZZLE INIT
// ═══════════════════════════════════════════════
function initPuzzle(){
  revealed=answer.split('').map(c=>c===' ');
  usedLetters=new Set();
  roundScores=[0,0];
  lastSpin=0; canGuess=false; currentTeam=0;
  buildPuzzle();
  buildAlpha();
  updateScores();
  updateTurn();
  updateBuyBtn();
  document.getElementById('spin-result').textContent='Click the wheel to spin!';
  document.getElementById('spin-result').className='spin-result';
}

// ═══════════════════════════════════════════════
// PUZZLE BOARD — dynamic tile sizing
// ═══════════════════════════════════════════════
function buildPuzzle(){
  const band=document.getElementById('puzzle-band');
  band.innerHTML='';
  const words=answer.split(' ');
  const MAX=13;
  let rows=[[]];
  words.forEach(word=>{
    const cur=rows[rows.length-1];
    const curLen=cur.reduce((s,w)=>s+w.length,0)+(cur.length>0?cur.length:0);
    if(cur.length>0&&curLen+word.length+1>MAX) rows.push([]);
    rows[rows.length-1].push(word);
  });

  // token list
  const tokens=[];
  for(let ai=0;ai<answer.length;ai++){
    tokens.push({type:answer[ai]===' '?'space':'letter',char:answer[ai],idx:ai});
  }

  const numRows=rows.length;
  const rowLens=rows.map(row=>row.reduce((s,w)=>s+w.length,0)+(row.length-1));
  const maxRowLen=Math.max(...rowLens);
  const GAP=5, SPACEW=18, PADH=20, PADW=28;
  const bandW=window.innerWidth;
  const bandH=window.innerHeight*0.30;

  // number of space-gaps per row (approx average)
  const avgSpaces=rows.reduce((s,r)=>s+(r.length-1),0)/numRows;
  const twByW=Math.floor((bandW-PADW*2-(maxRowLen-1)*GAP-avgSpaces*SPACEW)/maxRowLen);
  const thByH=Math.floor((bandH-PADH*2-(numRows-1)*GAP)/numRows);
  const tileH=Math.min(thByH,Math.round(twByW*1.5),130);
  const tileW=Math.min(twByW,Math.round(tileH/1.5),90);
  const fontSize=Math.round(tileH*0.52);

  let ti=0;
  rows.forEach((row,ri)=>{
    const rowEl=document.createElement('div');
    rowEl.className='puzzle-row';
    row.forEach((word,wi)=>{
      if(wi>0){
        ti++;
        const sp=document.createElement('div');
        sp.className='tile space';
        sp.style.width=SPACEW+'px';
        sp.style.height=tileH+'px';
        rowEl.appendChild(sp);
      } else if(ri>0){
        ti++;
      }
      word.split('').forEach(()=>{
        const tok=tokens[ti++];
        const t=document.createElement('div');
        t.className='tile letter'+(revealed[tok.idx]?' revealed':'');
        t.dataset.idx=tok.idx;
        t.style.width=tileW+'px';
        t.style.height=tileH+'px';
        t.style.fontSize=fontSize+'px';
        if(revealed[tok.idx]) t.textContent=tok.char;
        rowEl.appendChild(t);
      });
    });
    band.appendChild(rowEl);
  });
}

function revealLetter(letter){
  let n=0;
  answer.split('').forEach((c,i)=>{
    if(c===letter&&!revealed[i]){
      revealed[i]=true; n++;
      const t=document.querySelector(`.tile[data-idx="${i}"]`);
      if(t){t.textContent=letter;t.classList.add('revealed','just-revealed');setTimeout(()=>t.classList.remove('just-revealed'),400);}
    }
  });
  return n;
}
function allRevealed(){return answer.split('').every((c,i)=>c===' '||revealed[i]);}
function revealAll(){
  answer.split('').forEach((c,i)=>{
    if(c!==' '&&!revealed[i]){
      revealed[i]=true;
      const t=document.querySelector(`.tile[data-idx="${i}"]`);
      if(t){t.textContent=c;t.classList.add('revealed');}
    }
  });
}

// ═══════════════════════════════════════════════
// ALPHABET
// ═══════════════════════════════════════════════
function buildAlpha(){
  const g=document.getElementById('alpha-grid');
  g.innerHTML='';
  'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('').forEach(c=>{
    const b=document.createElement('button');
    b.id='al-'+c;
    b.className='alpha-btn'+(VOWELS.has(c)?' vowel':'')+(usedLetters.has(c)?' used':'');
    b.textContent=c;
    b.disabled=usedLetters.has(c)||!canGuess||VOWELS.has(c);
    b.onclick=()=>guessLetter(c);
    g.appendChild(b);
  });
}
function setAlphaEnabled(en){
  document.querySelectorAll('.alpha-btn:not(.used)').forEach(b=>{
    b.disabled=!en||VOWELS.has(b.textContent);
  });
}
function markUsed(c){
  const b=document.getElementById('al-'+c);
  if(b){b.classList.add('used');b.disabled=true;}
}

// ═══════════════════════════════════════════════
// SPIN
// ═══════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('wc').addEventListener('click',doSpin);
});

function doSpin(){
  if(spinning||canGuess) return;
  snd('click');
  spinning=true;
  setAlphaEnabled(false);
  document.getElementById('spin-result').textContent='Spinning...';
  document.getElementById('spin-result').className='spin-result';
  document.getElementById('wc').classList.add('spinning');

  const target=wAngle+(4+Math.random()*5)*2*Math.PI+Math.floor(Math.random()*NS)*ARC;
  spinToAngle(target, 2600+Math.random()*1000, ()=>{
    spinning=false;
    document.getElementById('wc').classList.remove('spinning');
    const norm=((wAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
    const ptrInWheel=((Math.PI/2-norm)%(2*Math.PI)+2*Math.PI)%(2*Math.PI);
    const seg=SEGS[Math.floor(ptrInWheel/ARC)%NS];

    if(seg.lose){
      snd('lose');
      document.getElementById('spin-result').textContent='LOSE A TURN! 😬';
      document.getElementById('spin-result').className='spin-result lose';
      setTimeout(switchTeam,1400);
    } else {
      lastSpin=seg.pts;
      document.getElementById('spin-result').textContent=`$${seg.pts}! Pick a letter!`;
      canGuess=true;
      setAlphaEnabled(true);
    }
  });
}

// ═══════════════════════════════════════════════
// GUESS
// ═══════════════════════════════════════════════
function guessLetter(c){
  if(!canGuess||usedLetters.has(c)||VOWELS.has(c)) return;
  snd('click');
  usedLetters.add(c); markUsed(c);
  canGuess=false; setAlphaEnabled(false);
  const n=revealLetter(c);
  if(n>0){
    const pts=lastSpin*n;
    roundScores[currentTeam]+=pts;
    updateScores(); snd('reveal');
    floatLbl(currentTeam,`+${pts}`);
    document.getElementById('spin-result').textContent=`${n} × $${lastSpin} = $${pts}! Spin again!`;
    if(allRevealed()){setTimeout(autoWin,700);return;}
  } else {
    snd('wrong');
    document.getElementById('spin-result').textContent=`No ${c}! 😬`;
    setTimeout(switchTeam,1200);
  }
}

// ═══════════════════════════════════════════════
// BUY VOWEL
// ═══════════════════════════════════════════════
function openBuyVowel(){
  snd('click');
  if(roundScores[currentTeam]<100){alert('Not enough points to buy a vowel!');return;}
  const choices=document.getElementById('vowel-choices');
  const res=document.getElementById('vowel-result');
  choices.innerHTML=''; res.style.display='none';
  ['A','E','I','O','U'].forEach(v=>{
    const b=document.createElement('button');
    b.className='modal-btn';
    b.style.cssText=`font-size:clamp(1.2rem,2.5vw,2rem);padding:14px 24px;min-width:56px;`;
    b.style.background=usedLetters.has(v)?'rgba(255,255,255,.1)':'linear-gradient(135deg,#ffe000,#ffb300)';
    b.style.color=usedLetters.has(v)?'rgba(255,255,255,.25)':'#5c2a00';
    b.disabled=usedLetters.has(v);
    b.textContent=v;
    b.onclick=()=>buyVowel(v,res);
    choices.appendChild(b);
  });
  document.getElementById('vowel-modal').classList.add('open');
}
function buyVowel(v,res){
  snd('vowel');
  roundScores[currentTeam]-=100;
  usedLetters.add(v); markUsed(v);
  updateScores();
  const n=revealLetter(v);
  if(n>0){
    res.textContent=`${n} ${v}${n>1?'s':''} ${n>1?'are':'is'} in the puzzle!`;
    res.className='modal-result win'; res.style.display='block';
    if(allRevealed()){setTimeout(()=>{document.getElementById('vowel-modal').classList.remove('open');autoWin();},900);return;}
  } else {
    res.textContent=`No ${v} in the puzzle.`;
    res.className='modal-result lose'; res.style.display='block';
  }
  setTimeout(()=>{
    document.getElementById('vowel-modal').classList.remove('open');
    if(n===0) switchTeam();
  },1200);
}
function closeVowelModal(){snd('click');document.getElementById('vowel-modal').classList.remove('open');}

// ═══════════════════════════════════════════════
// SOLVE
// ═══════════════════════════════════════════════
function openSolve(){
  snd('click');
  document.getElementById('solve-title').textContent=
    `✅ ${teamNames[currentTeam]} is solving!`;
  document.getElementById('solve-input').value='';
  document.getElementById('solve-result').style.display='none';
  document.getElementById('solve-modal').classList.add('open');
  setTimeout(()=>document.getElementById('solve-input').focus(),80);
}
function checkSolve(){
  snd('click');
  const attempt=document.getElementById('solve-input').value.trim().toUpperCase().replace(/[^A-Z ]/g,'').replace(/  +/g,' ');
  const res=document.getElementById('solve-result');
  if(attempt===answer){
    snd('fanfare'); confetti(); confetti();
    res.textContent='🎉 CORRECT!'; res.className='modal-result win'; res.style.display='block';
    roundScores[currentTeam]+=1000; updateScores();
    setTimeout(()=>{document.getElementById('solve-modal').classList.remove('open');revealAll();showWin();},1500);
  } else {
    snd('wrong');
    res.textContent='❌ Not quite! Control passes.'; res.className='modal-result lose'; res.style.display='block';
    setTimeout(()=>{document.getElementById('solve-modal').classList.remove('open');switchTeam();},1400);
  }
}
function closeSolve(){snd('click');document.getElementById('solve-modal').classList.remove('open');}
document.getElementById('solve-input').addEventListener('keydown',e=>{if(e.key==='Enter')checkSolve();});

// ═══════════════════════════════════════════════
// AUTO WIN
// ═══════════════════════════════════════════════
function autoWin(){
  snd('fanfare'); confetti(); confetti();
  roundScores[currentTeam]+=1000; updateScores();
  setTimeout(showWin,700);
}

// ═══════════════════════════════════════════════
// WIN
// ═══════════════════════════════════════════════
function showWin(){
  const n1=teamNames[0], n2=teamNames[1];
  document.getElementById('ws1').textContent=roundScores[0];
  document.getElementById('ws2').textContent=roundScores[1];
  document.getElementById('wn1').textContent='🔴 '+n1;
  document.getElementById('wn2').textContent='🔵 '+n2;
  document.getElementById('win-phrase').textContent=answer;
  let wt='';
  if(roundScores[0]>roundScores[1]) wt=`🔴 ${n1} wins!`;
  else if(roundScores[1]>roundScores[0]) wt=`🔵 ${n2} wins!`;
  else wt="🤝 It's a tie!";
  document.getElementById('win-title').textContent=wt;
  document.getElementById('win-winner').textContent=
    `🔴 ${n1}: ${roundScores[0]} pts  |  🔵 ${n2}: ${roundScores[1]} pts`;
  showScreen('winscreen');
}

// ═══════════════════════════════════════════════
// TURN & SCORES
// ═══════════════════════════════════════════════
function switchTeam(){
  currentTeam=currentTeam===0?1:0;
  lastSpin=0; canGuess=false;
  setAlphaEnabled(false);
  updateTurn(); updateBuyBtn();
  document.getElementById('spin-result').textContent='Click the wheel to spin!';
  document.getElementById('spin-result').className='spin-result';
}
function updateTurn(){
  const tp=document.getElementById('turn-pill');
  const name=teamNames[currentTeam];
  const emoji=currentTeam===0?'🔴':'🔵';
  tp.textContent=`${emoji} ${name}'s Turn`;
  tp.className='turn-pill '+(currentTeam===0?'t1':'t2');
  document.getElementById('sb1').classList.toggle('active-team',currentTeam===0);
  document.getElementById('sb2').classList.toggle('active-team',currentTeam===1);
}
function updateScores(){
  document.getElementById('ts1').textContent=roundScores[0];
  document.getElementById('ts2').textContent=roundScores[1];
  updateBuyBtn();
}
function updateBuyBtn(){
  document.getElementById('buy-v-btn').disabled=roundScores[currentTeam]<100;
}
function updateTeamNames(){
  const e1=teamNames[0], e2=teamNames[1];
  document.getElementById('sn1').textContent='🔴 '+e1.toUpperCase();
  document.getElementById('sn2').textContent='🔵 '+e2.toUpperCase();
  updateTurn();
}

// ═══════════════════════════════════════════════
// TEAM / SCORE EDIT
// ═══════════════════════════════════════════════
function openSettings(){
  snd('click');
  document.getElementById('newphrase-input').value='';
  document.getElementById('newphrase-modal').classList.add('open');
  setTimeout(()=>document.getElementById('newphrase-input').focus(),80);
}
function closeSettings(){
  snd('click');
  document.getElementById('newphrase-modal').classList.remove('open');
}
function confirmNewPhrase(){
  snd('click');
  const raw=document.getElementById('newphrase-input').value.trim().toUpperCase();
  if(!raw){alert('Please enter a phrase!');return;}
  const cleaned=raw.replace(/[^A-Z ]/g,'').replace(/  +/g,' ').trim();
  if(!cleaned){alert('Letters only please.');return;}
  document.getElementById('newphrase-modal').classList.remove('open');
  answer=cleaned;
  roundScores=[0,0];
  initPuzzle();
  showScreen('game');
  requestAnimationFrame(sizeWheel);
}
document.getElementById('newphrase-input').addEventListener('keydown',e=>{
  if(e.key==='Enter') confirmNewPhrase();
});

// ═══════════════════════════════════════════════
// TEAM / SCORE EDIT
// ═══════════════════════════════════════════════
function openTeamEdit(){
  snd('click');
  document.getElementById('ed-n1').value=teamNames[0];
  document.getElementById('ed-s1').value=roundScores[0];
  document.getElementById('ed-n2').value=teamNames[1];
  document.getElementById('ed-s2').value=roundScores[1];
  document.getElementById('team-modal').classList.add('open');
  setTimeout(()=>document.getElementById('ed-n1').focus(),80);
}
function saveTeamEdit(){
  snd('click');
  const n1=document.getElementById('ed-n1').value.trim()||'Team 1';
  const n2=document.getElementById('ed-n2').value.trim()||'Team 2';
  teamNames=[n1,n2];
  roundScores[0]=parseInt(document.getElementById('ed-s1').value)||0;
  roundScores[1]=parseInt(document.getElementById('ed-s2').value)||0;
  updateTeamNames();
  updateScores();
  document.getElementById('team-modal').classList.remove('open');
}
function closeTeamEdit(){
  snd('click');
  document.getElementById('team-modal').classList.remove('open');
}
document.getElementById('team-modal').onclick=e=>{
  if(e.target===document.getElementById('team-modal')) closeTeamEdit();
};

// ═══════════════════════════════════════════════
// SCREENS
// ═══════════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ═══════════════════════════════════════════════
// FLOAT LABEL
// ═══════════════════════════════════════════════
function floatLbl(team,text){
  const el=document.createElement('div');
  el.className='fl'; el.textContent=text;
  el.style.left=(team===0?'12%':'78%');
  el.style.top='55%';
  el.style.color=team===0?'#ffaaaa':'#aaccff';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1900);
}

// ═══════════════════════════════════════════════
// CONFETTI
// ═══════════════════════════════════════════════
function confetti(){
  const cols=['#ffe000','#ff2244','#2277ff','#00f0d0','#ff4da6','#00e855','#ff8800','#fff'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div'); el.className='cf';
    const s=6+Math.random()*11;
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${s}px;height:${s}px;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      animation-delay:${Math.random()*.7}s;animation-duration:${1.8+Math.random()*1.2}s;
      border-radius:${Math.random()>.5?'50%':'3px'}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3600);
  }
}

// ═══════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════
window.addEventListener('resize',()=>{
  if(document.getElementById('game').classList.contains('active')){
    sizeWheel(); buildPuzzle();
  }
});
</script>
