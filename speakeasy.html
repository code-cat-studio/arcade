<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SpeakEasy</title>
<link rel="icon" type="image/x-icon" href="/arcade/favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="/arcade/favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="/arcade/apple-touch-icon.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F0F4F8;
    min-height: 100vh;
    color: #0D1B3E;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  .app-header {
    background: #0D1B3E;
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .app-header img { height: 36px; width: 36px; object-fit: contain; }
  .app-header-title { font-size: 19px; font-weight: 900; color: white; letter-spacing: -0.3px; }
  .app-header-title span { color: #5B9FFF; }
  .header-student { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.6); display: none; }
  .header-student.visible { display: block; }
  .header-student strong { color: white; }

  /* ── PROGRESS BAR ── */
  .progress-bar { height: 5px; background: #E0E4F0; display: none; }
  .progress-bar.visible { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #1E5DBE, #5B9FFF);
    transition: width 0.4s ease;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex: 1; flex-direction: column; }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     SETUP SCREEN
  ══════════════════════════════ */
  #screen-setup {
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
    gap: 1.25rem;
  }

  .setup-logo { font-size: 60px; margin-bottom: 4px; }
  .setup-title { font-size: 36px; font-weight: 900; color: #0D1B3E; letter-spacing: -0.5px; }
  .setup-title span { color: #1E5DBE; }

  .setup-card {
    width: 100%; max-width: 500px;
    background: white; border-radius: 18px;
    padding: 1.5rem;
    box-shadow: 0 2px 12px rgba(13,27,62,0.08);
    display: flex; flex-direction: column; gap: 12px;
  }
  .setup-label {
    font-size: 15px; font-weight: 800;
    letter-spacing: 0.3px; color: #0D1B3E;
  }

  .name-input {
    width: 100%; padding: 14px 16px;
    font-size: 22px; font-family: 'Inter', sans-serif; font-weight: 700;
    border: 2px solid #E5E9EE; border-radius: 12px;
    background: #F8FAFB; color: #0D1B3E;
    outline: none; transition: border-color 0.2s;
  }
  .name-input:focus { border-color: #1E5DBE; background: white; }

  .q-selector { display: flex; gap: 10px; }
  .q-btn {
    flex: 1; padding: 20px 8px;
    font-size: 26px; font-weight: 900; font-family: 'Inter', sans-serif;
    border: 3px solid #E5E9EE; border-radius: 16px;
    background: #F8FAFB; color: #0D1B3E;
    cursor: pointer; text-align: center;
    transition: all 0.15s;
  }
  .q-btn .q-label { display: block; font-size: 12px; font-weight: 700; opacity: 0.6; margin-top: 4px; }
  .q-btn.selected { background: #1E5DBE; color: white; border-color: #1E5DBE; }
  .q-btn.selected .q-label { opacity: 0.8; }
  .q-btn:active { transform: scale(0.95); }

  .btn-begin {
    width: 100%; max-width: 500px;
    padding: 18px; font-size: 21px; font-weight: 900;
    font-family: 'Inter', sans-serif;
    background: #1E5DBE; color: white;
    border: none; border-radius: 16px; cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    box-shadow: 0 4px 14px rgba(30,93,190,0.3);
  }
  .btn-begin:hover { background: #1849A0; }
  .btn-begin:active { transform: scale(0.97); }
  .btn-begin:disabled { background: #C8D5E8; box-shadow: none; cursor: not-allowed; }

  /* ══════════════════════════════
     ASSESSMENT PAGES
  ══════════════════════════════ */
  .assess-screen {
    align-items: center;
    padding: 1.5rem 1.5rem 2rem;
    gap: 1.25rem;
    overflow-y: auto;
  }

  .page-header {
    width: 100%; max-width: 680px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .page-eyebrow { font-size: 12px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: #9AA3B8; }
  .page-title { font-size: 30px; font-weight: 900; color: #0D1B3E; letter-spacing: -0.4px; }
  .page-instruction { font-size: 16px; color: #6B7592; font-weight: 500; margin-top: 2px; }

  .category-card {
    width: 100%; max-width: 680px;
    background: white; border-radius: 18px;
    padding: 1.4rem 1.5rem;
    box-shadow: 0 2px 10px rgba(13,27,62,0.07);
    display: flex; flex-direction: column; gap: 14px;
  }
  .category-label { font-size: 16px; font-weight: 800; color: #0D1B3E; }

  .option-row { display: flex; gap: 10px; flex-wrap: wrap; }

  .option-btn {
    flex: 1; min-width: 110px;
    padding: 18px 12px; font-size: 18px; font-weight: 700;
    font-family: 'Inter', sans-serif;
    border: 2px solid #E5E9EE; border-radius: 14px;
    background: #F8FAFB; color: #0D1B3E;
    cursor: pointer; transition: all 0.15s; text-align: center; line-height: 1.3;
  }
  .option-btn:active { transform: scale(0.97); }
  .option-btn.selected { border-color: transparent; color: white; }
  .option-btn.selected.green  { background: #3DBE8F; }
  .option-btn.selected.yellow { background: #F5B942; color: #412402; }
  .option-btn.selected.red    { background: #EE7A55; }
  .points-badge { font-size: 13px; font-weight: 700; opacity: 0.75; display: block; margin-top: 4px; }

  .page-score-row {
    width: 100%; max-width: 680px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .page-score-label { font-size: 16px; font-weight: 700; color: #9AA3B8; }
  .page-score-val { font-size: 24px; font-weight: 900; color: #1E5DBE; }

  .btn-next-page {
    width: 100%; max-width: 680px;
    padding: 18px; font-size: 20px; font-weight: 900;
    font-family: 'Inter', sans-serif;
    background: #1E5DBE; color: white;
    border: none; border-radius: 16px; cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    box-shadow: 0 4px 14px rgba(30,93,190,0.3);
  }
  .btn-next-page:hover { background: #1849A0; }
  .btn-next-page:active { transform: scale(0.97); }
  .btn-next-page:disabled { background: #C8D5E8; box-shadow: none; cursor: not-allowed; }

  /* ══════════════════════════════
     SUMMARY SCREEN
  ══════════════════════════════ */
  #screen-summary {
    align-items: center;
    padding: 1.5rem 1.5rem 3rem;
    gap: 1.25rem;
    overflow-y: auto;
  }

  .summary-hero {
    width: 100%; max-width: 680px;
    background: #0D1B3E; border-radius: 20px;
    padding: 2rem 1.5rem; text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .summary-emoji { font-size: 56px; }
  .summary-name { font-size: 15px; font-weight: 700; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 1px; }
  .summary-score { font-size: 72px; font-weight: 900; color: white; line-height: 1; letter-spacing: -3px; }
  .summary-total { font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.45); margin-top: -6px; }
  .summary-message { font-size: 20px; font-weight: 800; color: #5B9FFF; margin-top: 6px; }

  .summary-breakdown { width: 100%; max-width: 680px; display: flex; flex-direction: column; gap: 10px; }

  .breakdown-card {
    background: white; border-radius: 16px;
    padding: 1.1rem 1.4rem;
    box-shadow: 0 2px 8px rgba(13,27,62,0.07);
    display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  }
  .breakdown-left { display: flex; flex-direction: column; gap: 4px; }
  .breakdown-title { font-size: 17px; font-weight: 800; color: #0D1B3E; }
  .breakdown-detail { font-size: 14px; font-weight: 500; color: #6B7592; line-height: 1.5; }
  .breakdown-score { font-size: 30px; font-weight: 900; color: #1E5DBE; white-space: nowrap; }
  .breakdown-score .of { font-size: 15px; font-weight: 600; color: #9AA3B8; }

  .btn-new-student {
    width: 100%; max-width: 680px;
    padding: 18px; font-size: 20px; font-weight: 900;
    font-family: 'Inter', sans-serif;
    background: #1E5DBE; color: white;
    border: none; border-radius: 16px; cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    box-shadow: 0 4px 14px rgba(30,93,190,0.3);
  }
  .btn-new-student:hover { background: #1849A0; }
  .btn-new-student:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-left">
    <img src="/arcade/logo.png" alt="Code Cat">
    <div class="app-header-title">Speak<span>Easy</span></div>
  </div>
  <div class="header-student" id="header-student">
    <strong id="header-name"></strong>
  </div>
</div>

<div class="progress-bar" id="progress-bar">
  <div class="progress-fill" id="progress-fill" style="width:0%"></div>
</div>

<!-- ══ SETUP ══ -->
<div class="screen active" id="screen-setup">
  <div class="setup-logo">🎤</div>
  <div class="setup-title">Speak<span>Easy</span></div>

  <div class="setup-card">
    <div class="setup-label">Who is speaking?</div>
    <input class="name-input" id="student-name" type="text" placeholder="Enter name..." maxlength="24" autocomplete="off" />
  </div>

  <div class="setup-card">
    <div class="setup-label">How many questions on the paper?</div>
    <div class="q-selector">
      <button class="q-btn" data-q="3" onclick="selectQ(this)">3<span class="q-label">questions</span></button>
      <button class="q-btn" data-q="4" onclick="selectQ(this)">4<span class="q-label">questions</span></button>
      <button class="q-btn" data-q="5" onclick="selectQ(this)">5<span class="q-label">questions</span></button>
      <button class="q-btn" data-q="6" onclick="selectQ(this)">6<span class="q-label">questions</span></button>
    </div>
  </div>

  <button class="btn-begin" id="btn-begin" disabled onclick="beginAssessment()">Begin ▶</button>
</div>

<!-- ══ DYNAMIC PAGES ══ -->
<div id="page-container"></div>

<!-- ══ SUMMARY ══ -->
<div class="screen" id="screen-summary">
  <div class="summary-hero">
    <div class="summary-emoji" id="summary-emoji">⭐</div>
    <div class="summary-name" id="summary-student-name"></div>
    <div class="summary-score" id="summary-score">0</div>
    <div class="summary-total" id="summary-total">out of — points</div>
    <div class="summary-message" id="summary-message"></div>
  </div>
  <div class="summary-breakdown" id="summary-breakdown"></div>
  <button class="btn-new-student" onclick="newStudent()">Next Student →</button>
</div>

<script>
// ── STATE ──
let studentName = '';
let numQ        = 0;
let maxTotal    = 0;
let grades      = {};  // { pageIndex: { cat: val } }
let currentPage = 0;   // 0 = reading, 1..numQ = questions
let totalPages  = 0;

const pageMaxScores = { reading: 6, question: 4 };

const catConfig = {
  reading: [
    { key: 'volume',  label: '🔊 Volume',        options: [
      { label: '🔇 Too Quiet', val: 1, color: 'yellow' },
      { label: '📢 Good & Loud', val: 2, color: 'green' },
    ]},
    { key: 'speed',   label: '⏱️ Speed',          options: [
      { label: '🐢 Too Slow', val: 1, color: 'yellow' },
      { label: '👍 Just Right', val: 2, color: 'green' },
      { label: '⚡ Too Fast', val: 1, color: 'yellow' },
    ]},
    { key: 'clarity', label: '👄 Clear Speaking', options: [
      { label: '😕 Hard to Understand', val: 0, color: 'red' },
      { label: '😊 Speaks Clearly', val: 2, color: 'green' },
    ]},
  ],
  question: [
    { key: 'volume',   label: '🔊 Volume',        options: [
      { label: '🔇 Too Quiet', val: 0, color: 'red' },
      { label: '📢 Good & Loud', val: 1, color: 'green' },
    ]},
    { key: 'clarity',  label: '👄 Clear Speaking', options: [
      { label: '😕 Hard to Understand', val: 0, color: 'red' },
      { label: '😊 Speaks Clearly', val: 1, color: 'green' },
    ]},
    { key: 'accuracy', label: '✅ Correct Answer?', options: [
      { label: '❌ No Answer', val: 0, color: 'red' },
      { label: '🤔 Almost!', val: 1, color: 'yellow' },
      { label: '✅ Yes!', val: 2, color: 'green' },
    ]},
  ],
};

// ── SETUP ──
let selectedQ = 0;
let nameEntered = false;

function selectQ(btn) {
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedQ = parseInt(btn.dataset.q);
  checkBeginReady();
}

document.getElementById('student-name').addEventListener('input', function() {
  nameEntered = this.value.trim().length > 0;
  checkBeginReady();
});

function checkBeginReady() {
  document.getElementById('btn-begin').disabled = !(nameEntered && selectedQ > 0);
}

function beginAssessment() {
  studentName = document.getElementById('student-name').value.trim();
  numQ        = selectedQ;
  totalPages  = numQ + 1; // reading + questions
  maxTotal    = 6 + numQ * 4;
  grades      = {};
  for (let i = 0; i < totalPages; i++) grades[i] = {};
  currentPage = 0;

  document.getElementById('header-name').textContent = studentName;
  document.getElementById('header-student').classList.add('visible');
  document.getElementById('progress-bar').classList.add('visible');

  buildPages();
  setProgress(0);
  showScreen('screen-p0');
}

// ── BUILD PAGES DYNAMICALLY ──
function buildPages() {
  const container = document.getElementById('page-container');
  container.innerHTML = '';

  for (let i = 0; i < totalPages; i++) {
    const isReading = i === 0;
    const pageType  = isReading ? 'reading' : 'question';
    const pageNum   = isReading ? null : i;
    const pageTitle = isReading ? '📖 Reading' : `💬 Question ${i}`;
    const maxScore  = isReading ? 6 : 4;
    const cats      = catConfig[pageType];

    const screen = document.createElement('div');
    screen.className = 'screen assess-screen';
    screen.id = `screen-p${i}`;

    // Header
    screen.innerHTML = `
      <div class="page-header">
        <div class="page-eyebrow">Part ${i + 1} of ${totalPages}</div>
        <div class="page-title">${pageTitle}</div>
        <div class="page-instruction">Tap a button for each part.</div>
      </div>
    `;

    // Category cards
    cats.forEach(cat => {
      const card = document.createElement('div');
      card.className = 'category-card';
      card.innerHTML = `<div class="category-label">${cat.label}</div>`;

      const row = document.createElement('div');
      row.className = 'option-row';

      cat.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.innerHTML = `${opt.label}<span class="points-badge">${opt.val} pt${opt.val !== 1 ? 's' : ''}</span>`;
        btn.onclick = () => {
          row.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected','green','yellow','red'));
          btn.classList.add('selected', opt.color);
          grades[i][cat.key] = opt.val;
          updatePageScore(i, cats, maxScore);
        };
        row.appendChild(btn);
      });

      card.appendChild(row);
      screen.appendChild(card);
    });

    // Score row
    const scoreRow = document.createElement('div');
    scoreRow.className = 'page-score-row';
    scoreRow.innerHTML = `
      <div class="page-score-label">${isReading ? 'Reading Score' : `Question ${i} Score`}</div>
      <div class="page-score-val" id="score-p${i}">— / ${maxScore}</div>
    `;
    screen.appendChild(scoreRow);

    // Next button
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn-next-page';
    nextBtn.id = `btn-p${i}-next`;
    nextBtn.disabled = true;
    const isLast = i === totalPages - 1;
    nextBtn.textContent = isLast ? 'See Results 🎉' : 'Next →';
    nextBtn.onclick = isLast ? showSummary : () => goToPage(i + 1);
    screen.appendChild(nextBtn);

    container.appendChild(screen);
  }
}

function goToPage(page) {
  const pct = Math.round((page / totalPages) * 100);
  setProgress(pct);
  showScreen(`screen-p${page}`);
}

function updatePageScore(pageIdx, cats, maxScore) {
  let total = 0, complete = true;
  cats.forEach(cat => {
    if (grades[pageIdx][cat.key] === undefined) { complete = false; }
    else { total += grades[pageIdx][cat.key]; }
  });

  const el = document.getElementById(`score-p${pageIdx}`);
  if (el) el.textContent = complete ? `${total} / ${maxScore}` : `— / ${maxScore}`;

  const btn = document.getElementById(`btn-p${pageIdx}-next`);
  if (btn) btn.disabled = !complete;
}

// ── SUMMARY ──
function showSummary() {
  setProgress(100);
  let total = 0;
  const breakdownHTML = [];

  for (let i = 0; i < totalPages; i++) {
    const isReading = i === 0;
    const cats      = catConfig[isReading ? 'reading' : 'question'];
    const maxScore  = isReading ? 6 : 4;
    const title     = isReading ? '📖 Reading' : `💬 Question ${i}`;

    let pageTotal = 0;
    cats.forEach(cat => { if (grades[i][cat.key] !== undefined) pageTotal += grades[i][cat.key]; });
    total += pageTotal;

    const labelMap = {
      volume:   { 0: '🔇 Too Quiet', 1: '📢 Good & Loud', 2: '📢 Good & Loud' },
      speed:    { 1: '🐢 Too Slow / ⚡ Too Fast', 2: '👍 Just Right' },
      clarity:  { 0: '😕 Hard to Understand', 1: '😊 Speaks Clearly', 2: '😊 Speaks Clearly' },
      accuracy: { 0: '❌ No Answer', 1: '🤔 Almost!', 2: '✅ Yes!' },
    };

    const details = cats.map(cat => {
      const val = grades[i][cat.key];
      return labelMap[cat.key]?.[val] ?? '';
    }).filter(Boolean).join(' · ');

    breakdownHTML.push(`
      <div class="breakdown-card">
        <div class="breakdown-left">
          <div class="breakdown-title">${title}</div>
          <div class="breakdown-detail">${details}</div>
        </div>
        <div class="breakdown-score">${pageTotal}<span class="of"> / ${maxScore}</span></div>
      </div>
    `);
  }

  document.getElementById('summary-breakdown').innerHTML = breakdownHTML.join('');
  document.getElementById('summary-student-name').textContent = studentName;
  document.getElementById('summary-score').textContent        = total;
  document.getElementById('summary-total').textContent        = `out of ${maxTotal} points`;

  const pct = total / maxTotal;
  let emoji, message;
  if      (pct >= 0.89) { emoji = '🌟'; message = 'Wow, absolutely amazing!'; }
  else if (pct >= 0.75) { emoji = '⭐'; message = 'You did a great job!'; }
  else if (pct >= 0.60) { emoji = '👍'; message = 'Nice work, keep it up!'; }
  else if (pct >= 0.45) { emoji = '💪'; message = 'Good try — keep practising!'; }
  else                   { emoji = '📚'; message = 'Let\'s practise more together!'; }

  document.getElementById('summary-emoji').textContent   = emoji;
  document.getElementById('summary-message').textContent = message;

  showScreen('screen-summary');
}

// ── NEW STUDENT ──
function newStudent() {
  studentName = '';
  selectedQ   = 0;
  nameEntered = false;
  document.getElementById('student-name').value = '';
  document.getElementById('header-student').classList.remove('visible');
  document.getElementById('progress-bar').classList.remove('visible');
  document.querySelectorAll('.q-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-begin').disabled = true;
  setProgress(0);
  showScreen('screen-setup');
}

// ── HELPERS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function setProgress(pct) {
  document.getElementById('progress-fill').style.width = pct + '%';
}
</script>
</body>
</html>
